version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: kaloko-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    networks:
      - kaloko-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: kaloko-backend
    ports:
      - "${SERVER_PORT}:8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      HIBERNATE_DDL_AUTO: ${HIBERNATE_DDL_AUTO}
    volumes:
      - .:/app
    depends_on:
      - mysql-db
    restart: always
    networks:
      - kaloko-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: kaloko-phpmyadmin
    environment:
      PMA_HOST: mysql-db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    ports:
      - "8082:80"
    depends_on:
      - mysql-db
    restart: always
    networks:
      - kaloko-network

volumes:
  mysql_data:

networks:
  kaloko-network:
    driver: bridge