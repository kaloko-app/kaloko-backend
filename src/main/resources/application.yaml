server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: kaloko-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:kaloko_db}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:kaloko_user}
    password: ${DB_PASSWORD:kaloko_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: ${JWT_EXPIRATION:86400000} # 24 hours
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days